<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pierre Demient</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050505;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .hidden {
            display: none !important;
        }

        /* BACKGROUND HALAMAN KETIKA MASIH TOMBOL CLICK HERE */
        #click-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2560&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.4s ease;
        }

        #entry-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 14px 36px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 3px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        #entry-btn:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transform: scale(1.02);
        }

        /* LOADING SCREEN TRANSISI */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        #loading-screen.fade-out, #click-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* CANVAS EFEK CACING 3D */
        #wormhole-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* BACKGROUND UTAMA SETELAH MASUK */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #06060c;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(10,10,25,0) 30%, rgba(5,5,10,0.85) 100%);
            z-index: -1;
        }

        /* PROFILE WRAPPER */
        .profile-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            animation: fadeIn 1.2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-main-wrapper {
            margin-bottom: 15px;
        }

        .animate-float {
            animation: floatAnimation 3.5s ease-in-out infinite;
        }

        @keyframes floatAnimation {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .avatar-main {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 3.5px solid #050505;
        }

        .status-dot.online { background-color: #23a55a; }
        .status-dot.idle { background-color: #f0b232; }
        .status-dot.dnd { background-color: #f23f43; }
        .status-dot.offline { background-color: #80848e; }

        .username-title {
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
            animation: blueGlitch 2s ease-in-out infinite alternate;
        }

        @keyframes blueGlitch {
            0% { text-shadow: 0 0 10px rgba(255,255,255,0.4), 0 0 2px rgba(0, 150, 255, 0.2); }
            100% { text-shadow: 0 0 14px rgba(255,255,255,0.6), 0 0 8px rgba(0, 150, 255, 0.5); }
        }

        .sub-profile-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 24px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            margin-top: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.6);
            min-width: 210px;
        }

        .sub-info {
            text-align: center;
            width: 100%;
        }

        .sub-username {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
        }

        .status {
            font-size: 0.75rem;
            color: #9aa0a6;
            margin-top: 2px;
        }

        /* MUSIC PLAYER CARD STYLE */
        .music-player-card {
            display: flex;
            align-items: center;
            background: rgba(15, 15, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 18px;
            border-radius: 14px;
            backdrop-filter: blur(15px);
            width: 420px;
            max-width: 90vw;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .mp-cover {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: #0096ff;
            text-shadow: 0 0 8px rgba(0, 150, 255, 0.6);
            margin-right: 14px;
        }

        .mp-details {
            flex-grow: 1;
            text-align: left;
            margin-right: 15px;
            overflow: hidden;
        }

        .mp-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mp-progress-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #aaa;
        }

        .mp-progress-bar {
            flex-grow: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .mp-progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0066ff, #00d8ff);
            border-radius: 2px;
            transition: width 0.3s linear;
        }

        .mp-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mp-btn {
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .mp-btn:hover {
            color: #ffffff;
        }

        .mp-btn:active {
            transform: scale(0.9);
        }

        .mp-btn.play-toggle {
            font-size: 1.1rem;
            color: #ffffff;
            width: 20px;
            text-align: center;
        }

        /* SOSMED ICONS */
        .social-icons {
            display: flex;
            gap: 22px;
        }

        .icon {
            font-size: 1.65rem;
            color: #ffffff;
            text-decoration: none;
            opacity: 0.8;
            transition: all 0.2s ease;
        }

        .icon:hover {
            opacity: 1;
            transform: translateY(-3px);
        }
        .yt:hover { color: #ff0000; }
        .ig:hover { color: #e1306c; }
        .tt:hover { color: #ffffff; }
        .dc:hover { color: #5865F2; }

        .view-counter {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.35);
        }

        /* FIX AUDIO: Player tidak boleh benar-benar dnd / 0px agar tidak tersuspend browser */
        #youtube-player {
            position: fixed;
            bottom: 2px;
            right: 2px;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            z-index: -100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="click-screen">
        <button id="entry-btn">CLICK HERE</button>
    </div>

    <div id="loading-screen" class="hidden">
        <div class="spinner"></div>
    </div>

    <canvas id="wormhole-canvas"></canvas>

    <div id="youtube-player"></div>

    <div class="video-container">
        <div class="overlay"></div>
    </div>

    <div class="profile-container hidden" id="main-profile">
        
        <div class="avatar-main-wrapper animate-float">
            <div class="avatar-container">
                <img id="discord-avatar" src="avatar-main.png" alt="Pierre Demient" class="avatar-main">
                <div id="discord-status-dot" class="status-dot offline"></div>
            </div>
        </div>

        <h1 class="username-title">Pierre Demient</h1>

        <div class="sub-profile-box">
            <div class="sub-info">
                <p id="discord-custom-status" class="sub-username">@pierredemient</p>
                <p id="discord-activity" class="status">Offline</p>
            </div>
        </div>

        <div class="music-player-card">
            <div class="mp-cover">
                <i class="fas fa-compact-disc fa-spin" style="animation-duration: 4s;"></i>
            </div>
            <div class="mp-details">
                <div class="mp-title" id="track-title">Bruno Mars - When I Was Your Man</div>
                <div class="mp-progress-wrapper">
                    <span id="current-time">0:00</span>
                    <div class="mp-progress-bar">
                        <div class="mp-progress-fill" id="forward-fill"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
            </div>
            <div class="mp-controls">
                <button class="mp-btn"><i class="fas fa-backward"></i></button>
                <button class="mp-btn play-toggle" id="play-btn"><i class="fas fa-pause"></i></button>
                <button class="mp-btn"><i class="fas fa-forward"></i></button>
            </div>
        </div>

        <div class="social-icons">
            <a href="https://youtube.com" target="_blank" class="icon yt"><i class="fab fa-youtube"></i></a>
            <a href="https://instagram.com" target="_blank" class="icon ig"><i class="fab fa-instagram"></i></a>
            <a href="https://tiktok.com" target="_blank" class="icon tt"><i class="fab fa-tiktok"></i></a>
            <a href="https://discord.com" target="_blank" class="icon dc"><i class="fab fa-discord"></i></a>
        </div>

        <div class="view-counter">
            <i class="far fa-eye"></i> <span id="count">0</span>
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const discordId = "439281048593920102";
        let player;
        let isPlaying = false;
        let progressInterval;

        // Visitor Counter
        let views = localStorage.getItem('site_views');
        if (views === null) { views = 161; } else { views = parseInt(views) + 1; }
        localStorage.setItem('site_views', views);
        document.getElementById('count').innerText = views;

        const clickScreen = document.getElementById('click-screen');
        const loadingScreen = document.getElementById('loading-screen');
        const mainProfile = document.getElementById('main-profile');
        const entryBtn = document.getElementById('entry-btn');
        const playBtn = document.getElementById("play-btn");
        const progressFill = document.getElementById("forward-fill");
        const currentTimeEl = document.getElementById("current-time");
        const durationEl = document.getElementById("duration");
        const trackTitleEl = document.getElementById("track-title");

        // Inisialisasi Player YouTube API
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                videoId: 'kON9fn01rUQ',
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'kON9fn01rUQ',
                    'rel': 0,
                    'mute': 1,
                    'enablejsapi': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            console.log("Player Terhubung.");
            if(player.getVideoData && player.getVideoData().title) {
                trackTitleEl.innerText = player.getVideoData().title;
            }
            player.playVideo();
        }

        function formatTime(time) {
            const mins = Math.floor(time / 60);
            const secs = Math.floor(time % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function updateProgressBar() {
            if (player && typeof player.getCurrentTime === 'function') {
                const current = player.getCurrentTime();
                const total = player.getDuration();
                
                if (total > 0) {
                    const percentage = (current / total) * 100;
                    progressFill.style.width = percentage + "%";
                    currentTimeEl.innerText = formatTime(current);
                    durationEl.innerText = formatTime(total);
                }
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                clearInterval(progressInterval);
                progressInterval = setInterval(updateProgressBar, 1000);
            } else {
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                clearInterval(progressInterval);
            }
        }

        // AKSI INTERAKSI UTAMA (Pelepas Bloatware Autoplay Browser)
        entryBtn.addEventListener('click', () => {
            clickScreen.classList.add('fade-out');
            loadingScreen.classList.remove('hidden');

            // Force play audio beruntun dengan sedikit delay
            if (player && typeof player.playVideo === 'function') {
                player.unMute(); 
                player.setVolume(100);
                player.playVideo();
            }

            setTimeout(() => {
                if (player && typeof player.playVideo === 'function') {
                    player.unMute();
                    player.setVolume(100);
                    player.playVideo();
                }
            }, 200);

            setTimeout(() => {
                clickScreen.remove();
                getDiscordData();
                
                setTimeout(() => {
                    closeLoading();
                    mainProfile.classList.remove('hidden'); 
                }, 400);
            }, 300);
        });

        playBtn.addEventListener('click', function(e) {
            e.stopPropagation(); 
            if (player && typeof player.getPlayerState === 'function') {
                if (!isPlaying) {
                    player.unMute();
                    player.playVideo();
                } else {
                    player.pauseVideo();
                }
            }
        });

        // Fetch Lanyard Discord
        function getDiscordData() {
            fetch(`https://api.lanyard.rest/v1/users/${discordId}`)
                .then(res => res.json())
                .then(response => {
                    if (!response.success) return;
                    const data = response.data;
                    
                    const avatarImg = document.getElementById('discord-avatar');
                    if (data.discord_user.avatar) {
                        avatarImg.src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png?size=256`;
                    }

                    const statusDot = document.getElementById('discord-status-dot');
                    statusDot.className = `status-dot ${data.discord_status}`;

                    const customStatusEl = document.getElementById('discord-custom-status');
                    if (data.custom_status) {
                        let statusText = "";
                        if (data.custom_status.emoji) statusText += data.custom_status.emoji.name + " ";
                        statusText += data.custom_status.text || "";
                        customStatusEl.innerText = statusText || `@${data.discord_user.username}`;
                    } else {
                        customStatusEl.innerText = `@${data.discord_user.username}`;
                    }

                    const activityEl = document.getElementById('discord-activity');
                    const gameActivity = data.activities.find(act => act.type === 0);
                    const spotifyActivity = data.listening_to_spotify ? data.activities.find(act => act.name === "Spotify") : null;

                    if (spotifyActivity) {
                        activityEl.innerHTML = `<i class="fab fa-spotify" style="color: #1DB954;"></i> Listening to ${spotifyActivity.details}`;
                    } else if (gameActivity) {
                        activityEl.innerHTML = `<i class="fas fa-gamepad"></i> Playing ${gameActivity.name}`;
                    } else {
                        if (data.discord_status === "online") activityEl.innerText = "Active Now";
                        else if (data.discord_status === "idle") activityEl.innerText = "Idle";
                        else if (data.discord_status === "dnd") activityEl.innerText = "Do Not Disturb";
                        else activityEl.innerText = "Offline";
                    }
                })
                .catch(err => console.log("Lanyard error"));
        }

        function closeLoading() {
            if (loadingScreen) {
                loadingScreen.classList.add('fade-out');
                setTimeout(() => loadingScreen.remove(), 300);
            }
        }

        setInterval(getDiscordData, 7000);


        // ==========================================
        //  ENGINE ANIMASI EFECT CACING 3D (WORMHOLE)
        // ==========================================
        const canvas = document.getElementById('wormhole-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        window.addEventListener('mousemove', (e) => {
            mouse.targetX = e.clientX;
            mouse.targetY = e.clientY;
        });

        // Struktur pembentuk segmen cacing/ring terowongan
        const ringCount = 45; 
        const rings = [];

        for (let i = 0; i < ringCount; i++) {
            rings.push({
                x: width / 2,
                y: height / 2,
                angle: 0,
                radius: 0,
                colorHue: (i / ringCount) * 60 + 200 // Skema warna biru-cyan neon
            });
        }

        let speedZ = 0.005;
        let baseRotate = 0;

        function animateWormhole() {
            // Memberikan efek trail/jejak samar di background gelap
            ctx.fillStyle = 'rgba(5, 5, 10, 0.12)';
            ctx.fillRect(0, 0, width, height);

            // Lerp pergerakan mouse agar smooth meliuk-liuk
            mouse.x += (mouse.targetX - mouse.x) * 0.06;
            mouse.y += (mouse.targetY - mouse.y) * 0.06;

            baseRotate += 0.002;

            for (let i = ringCount - 1; i >= 0; i--) {
                let ring = rings[i];
                
                // Menghitung perspektif kedalaman 3D terowongan cacing
                let z = (i / ringCount); 
                let targetRadius = (1 - z) * (Math.max(width, height) * 0.6);
                
                // Membuat pusat cacing meliuk dinamis mengikuti mouse
                let targetX = mouse.x * z + (width / 2) * (1 - z);
                let targetY = mouse.y * z + (height / 2) * (1 - z);
                
                ring.x += (targetX - ring.x) * 0.2;
                ring.y += (targetY - ring.y) * 0.2;
                ring.radius = targetRadius;

                // Menggambar lingkaran/segmen berstruktur cacing
                ctx.beginPath();
                ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
                
                // Set warna neon memudar di bagian terdalam terowongan
                let alpha = (1 - z) * 0.45;
                ctx.strokeStyle = `hsla(${ring.colorHue}, 90%, 60%, ${alpha})`;
                ctx.lineWidth = (1 - z) * 4.5 + 0.5;
                
                // Tambahkan sedikit efek bayangan neon terang
                ctx.shadowBlur = (1 - z) * 8;
                ctx.shadowColor = `hsl(${ring.colorHue}, 90%, 60%)`;
                
                ctx.stroke();
            }
            
            // Reset efek bayangan agar tidak merusak performa render elemen HTML lain
            ctx.shadowBlur = 0;

            requestAnimationFrame(animateWormhole);
        }
        
        // Jalankan animasi terowongan cacing
        animateWormhole();
    </script>
</body>
</html>
